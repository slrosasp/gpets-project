<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">    
  <title>Gpets - Actualizar Perfil</title>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <script src="https://kit.fontawesome.com/0faddc1af8.js" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .glass-effect {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 35px -5px rgba(0, 0, 0, 0.1);
    }
    .hover-scale {
      transition: transform 0.3s ease;
    }
    .hover-scale:hover {
      transform: scale(1.02);
    }
    .input-focus-effect {
      transition: all 0.3s ease;
    }
    .input-focus-effect:focus {
      transform: translateY(-1px);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    .animate-spin {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body class="antialiased min-h-screen">
  <nav class="glass-effect fixed top-0 left-0 right-0 z-50 px-6 py-3">
    <div class="max-w-7xl mx-auto flex justify-between items-center">

      <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='/assets/html/dashboard.html'">
        <div class="w-10 h-10 bg-gradient-to-br from-teal-400 to-teal-600 rounded-full flex items-center justify-center">
          <i class="fas fa-paw text-white text-xl"></i>
        </div>
        <span class="text-2xl font-bold text-gray-900">Gpets</span>
      </div>

      <div class="relative" id="userMenuContainer">
        <button id="userMenuButton" class="flex items-center gap-3 bg-white/80 hover:bg-white rounded-xl px-4 py-2 transition-all transform hover:scale-[1.02] shadow-md border border-gray-100">
          <div class="w-10 h-10 bg-gradient-to-br from-teal-400 to-teal-600 rounded-full flex items-center justify-center overflow-hidden">
            <i class="fas fa-user text-white text-lg" id="userAvatarIcon"></i>
            <img id="userAvatarImage" class="w-full h-full object-cover hidden" src="" alt="Avatar">
          </div>
          <div class="text-left hidden md:block">
            <p class="text-sm font-semibold text-gray-900" id="navUserName">Cargando...</p>
            <p class="text-xs text-gray-500" id="navUserEmail">cargando@email.com</p>
          </div>
          <i class="fas fa-chevron-down text-gray-500 text-xs ml-1"></i>
        </button>
        
        <div id="userDropdown" class="absolute right-0 mt-2 w-64 glass-effect rounded-xl shadow-xl py-2 hidden z-50 border border-gray-100">
          <div class="px-4 py-3 border-b border-gray-100">
            <p class="text-sm font-semibold text-gray-900" id="dropdownUserName">Cargando...</p>
            <p class="text-xs text-gray-500 truncate" id="dropdownUserEmail">cargando@email.com</p>
          </div>
          <div class="py-1">
            <a href="/assets/html/update-profile.html" class="flex items-center gap-3 px-4 py-2.5 text-teal-700 bg-teal-50 transition-all">
              <i class="fas fa-user-edit w-5 text-teal-600"></i>
              <span class="text-sm font-medium">Editar Perfil</span>
            </a>
            <a href="/assets/html/mis-mascotas.html" class="flex items-center gap-3 px-4 py-2.5 text-gray-700 hover:bg-teal-50 hover:text-teal-700 transition-all">
              <i class="fas fa-paw w-5 text-teal-600"></i>
              <span class="text-sm font-medium">Mis Mascotas</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-2.5 text-gray-700 hover:bg-teal-50 hover:text-teal-700 transition-all">
              <i class="fas fa-cog w-5 text-teal-600"></i>
              <span class="text-sm font-medium">Configuración</span>
            </a>
          </div>
          <hr class="my-1 border-gray-200">
          <div class="py-1">
            <button id="logoutDropdownBtn" class="w-full flex items-center gap-3 px-4 py-2.5 text-red-600 hover:bg-red-50 transition-all">
              <i class="fas fa-sign-out-alt w-5"></i>
              <span class="text-sm font-medium">Cerrar Sesión</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="pt-24 pb-12 px-4">
    <div class="max-w-4xl mx-auto">

      <div class="glass-effect rounded-2xl p-8 mb-8">
        <div class="flex items-center gap-6">
          <div class="w-20 h-20 bg-gradient-to-br from-teal-400 to-teal-600 rounded-full flex items-center justify-center">
            <i class="fas fa-user-edit text-white text-3xl"></i>
          </div>
          <div>
            <h1 class="text-3xl font-bold text-gray-900">Actualizar Perfil</h1>
            <p class="text-gray-600 mt-1">Completa tu información personal y de contacto</p>
          </div>
        </div>
      </div>

      <!-- Formulario de perfil -->
      <div class="glass-effect rounded-2xl p-8">
        
        <!-- Avatar Section -->
        <div class="flex flex-col items-center mb-8 pb-8 border-b border-gray-200">
          <div class="relative">
            <div id="profileAvatarContainer" class="w-32 h-32 bg-gradient-to-br from-teal-400 to-teal-600 rounded-full flex items-center justify-center shadow-lg overflow-hidden">
              <i class="fas fa-user text-white text-5xl" id="profileAvatarIcon"></i>
              <img id="profileAvatarImage" class="w-full h-full object-cover hidden" src="" alt="Avatar">
            </div>
            <button id="changeAvatarBtn" class="absolute bottom-0 right-0 bg-white rounded-full p-2 shadow-lg hover:shadow-xl transition-all border border-gray-200">
              <i class="fas fa-camera text-teal-600 text-xl"></i>
            </button>
          </div>
          <input type="file" id="avatarInput" accept="image/*" class="hidden">
          <p class="text-sm text-gray-500 mt-4">Haz clic en el ícono de la cámara para cambiar tu foto</p>
        </div>

        <form id="updateProfileForm" class="space-y-6">
          
          <!-- Información Personal - NO MODIFICABLE -->
          <div class="mb-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
              <i class="fas fa-id-card text-teal-600"></i>
              Información Personal
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              
              <!-- Nombre Completo (displayName) -->
              <div class="space-y-2">
                <label for="displayName" class="text-sm font-semibold text-gray-700 block">
                  Nombre Completo
                </label>
                <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-user text-gray-400"></i>
                  </div>
                  <input type="text" id="displayName" readonly
                         class="pl-10 p-3 appearance-none block w-full bg-gray-100 text-gray-700 rounded-xl border border-gray-300 cursor-not-allowed">
                </div>
              </div>

              <!-- Email -->
              <div class="space-y-2">
                <label for="email" class="text-sm font-semibold text-gray-700 block">
                  Correo Electrónico
                </label>
                <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-envelope text-gray-400"></i>
                  </div>
                  <input type="email" id="email" readonly
                         class="pl-10 p-3 appearance-none block w-full bg-gray-100 text-gray-700 rounded-xl border border-gray-300 cursor-not-allowed">
                </div>
              </div>
            </div>
          </div>

          <!-- Información de Contacto - MODIFICABLE -->
          <div class="mb-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
              <i class="fas fa-phone-alt text-teal-600"></i>
              Información de Contacto
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              
              <!-- Teléfono (telefono) -->
              <div class="space-y-2">
                <label for="telefono" class="text-sm font-semibold text-gray-700 block">
                  Teléfono
                </label>
                <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-phone text-gray-400"></i>
                  </div>
                  <input type="tel" id="telefono" 
                         class="input-focus-effect pl-10 p-3 appearance-none block w-full bg-gray-50 placeholder-gray-400 rounded-xl border border-gray-200 focus:border-teal-500 focus:bg-white focus:ring-2 focus:ring-teal-200 outline-none transition-all"
                         placeholder="+51 980345678">
                </div>
              </div>

              <!-- Fecha de Nacimiento (fechaNacimiento) -->
              <div class="space-y-2">
                <label for="fechaNacimiento" class="text-sm font-semibold text-gray-700 block">
                  Fecha de Nacimiento
                </label>
                <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-calendar text-gray-400"></i>
                  </div>
                  <input type="date" id="fechaNacimiento" 
                         class="input-focus-effect pl-10 p-3 appearance-none block w-full bg-gray-50 text-gray-700 rounded-xl border border-gray-200 focus:border-teal-500 focus:bg-white focus:ring-2 focus:ring-teal-200 outline-none transition-all">
                </div>
              </div>
            </div>
          </div>

          <!-- Dirección - MODIFICABLE -->
          <div class="mb-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
              <i class="fas fa-map-marker-alt text-teal-600"></i>
              Dirección
            </h3>
            <div class="space-y-4">
              
              <!-- Calle (direccion) -->
              <div class="space-y-2">
                <label for="direccion" class="text-sm font-semibold text-gray-700 block">
                  Calle y Número
                </label>
                <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-home text-gray-400"></i>
                  </div>
                  <input type="text" id="direccion" 
                         class="input-focus-effect pl-10 p-3 appearance-none block w-full bg-gray-50 placeholder-gray-400 rounded-xl border border-gray-200 focus:border-teal-500 focus:bg-white focus:ring-2 focus:ring-teal-200 outline-none transition-all"
                         placeholder="Av. Los Tusilagos 123">
                </div>
              </div>

              <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- Ciudad (ciudad) -->
                <div class="space-y-2">
                  <label for="ciudad" class="text-sm font-semibold text-gray-700 block">
                    Ciudad
                  </label>
                  <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <i class="fas fa-city text-gray-400"></i>
                    </div>
                    <input type="text" id="ciudad" 
                           class="input-focus-effect pl-10 p-3 appearance-none block w-full bg-gray-50 placeholder-gray-400 rounded-xl border border-gray-200 focus:border-teal-500 focus:bg-white focus:ring-2 focus:ring-teal-200 outline-none transition-all"
                           placeholder="Lima">
                  </div>
                </div>

                <!-- País (pais) -->
                <div class="space-y-2">
                    <label for="pais" class="text-sm font-semibold text-gray-700 block">
                        País
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-globe-americas text-gray-400"></i>
                        </div>
                        <select id="pais" 
                            class="input-focus-effect pl-10 p-3 appearance-none block w-full bg-gray-50 text-gray-700 rounded-xl border border-gray-200 focus:border-teal-500 focus:bg-white focus:ring-2 focus:ring-teal-200 outline-none transition-all">
                            <option value="">Selecciona tu país</option>
                            <option value="AR">Argentina</option>
                            <option value="BO">Bolivia</option>
                            <option value="BR">Brasil</option>
                            <option value="CL">Chile</option>
                            <option value="CO">Colombia</option>
                            <option value="CR">Costa Rica</option>
                            <option value="CU">Cuba</option>
                            <option value="DO">República Dominicana</option>
                            <option value="EC">Ecuador</option>
                            <option value="SV">El Salvador</option>
                            <option value="GT">Guatemala</option>
                            <option value="HN">Honduras</option>
                            <option value="MX">México</option>
                            <option value="NI">Nicaragua</option>
                            <option value="PA">Panamá</option>
                            <option value="PY">Paraguay</option>
                            <option value="PE">Perú</option>
                            <option value="PR">Puerto Rico</option>
                            <option value="UY">Uruguay</option>
                            <option value="VE">Venezuela</option>
                        </select>
                    </div>
                </div>

                <!-- Código Postal (codigoPostal) -->
                <div class="space-y-2">
                  <label for="codigoPostal" class="text-sm font-semibold text-gray-700 block">
                    Código Postal
                  </label>
                  <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <i class="fas fa-mail-bulk text-gray-400"></i>
                    </div>
                    <input type="text" id="codigoPostal" 
                           class="input-focus-effect pl-10 p-3 appearance-none block w-full bg-gray-50 placeholder-gray-400 rounded-xl border border-gray-200 focus:border-teal-500 focus:bg-white focus:ring-2 focus:ring-teal-200 outline-none transition-all"
                           placeholder="1234567">
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Preferencias - MODIFICABLE -->
          <div class="mb-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
              <i class="fas fa-bell text-teal-600"></i>
              Preferencias
            </h3>
            <div class="space-y-3">
              <label class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl cursor-pointer hover:bg-gray-100 transition-all">
                <input type="checkbox" id="emailNotifications" class="w-5 h-5 text-teal-600 bg-gray-100 border-gray-300 rounded focus:ring-teal-500">
                <span class="text-gray-700 font-medium">Recibir notificaciones por email</span>
              </label>
              <label class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl cursor-pointer hover:bg-gray-100 transition-all">
                <input type="checkbox" id="smsNotifications" class="w-5 h-5 text-teal-600 bg-gray-100 border-gray-300 rounded focus:ring-teal-500">
                <span class="text-gray-700 font-medium">Recibir notificaciones por SMS</span>
              </label>
              <label class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl cursor-pointer hover:bg-gray-100 transition-all">
                <input type="checkbox" id="promoEmails" class="w-5 h-5 text-teal-600 bg-gray-100 border-gray-300 rounded focus:ring-teal-500">
                <span class="text-gray-700 font-medium">Recibir ofertas y promociones</span>
              </label>
            </div>
          </div>

          <!-- Botones de Acción -->
          <div class="flex flex-col sm:flex-row gap-4 pt-4 border-t border-gray-200">
            <button type="submit" id="saveProfileBtn" class="flex-1 bg-gradient-to-r from-teal-500 to-teal-600 text-white p-3 rounded-xl font-semibold hover:from-teal-600 hover:to-teal-700 transition-all transform hover:scale-[1.02] shadow-lg hover:shadow-xl flex items-center justify-center gap-2">
              <i class="fas fa-save"></i>
              Guardar Cambios
            </button>
            <button type="button" onclick="window.location.href='/assets/html/dashboard.html'" class="flex-1 bg-gradient-to-r from-gray-500 to-gray-600 text-white p-3 rounded-xl font-semibold hover:from-gray-600 hover:to-gray-700 transition-all transform hover:scale-[1.02] shadow-lg hover:shadow-xl flex items-center justify-center gap-2">
              <i class="fas fa-arrow-left"></i>
              Volver al Dashboard
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <script src="/assets/js/update-profile.js" type="module"></script>
  
</body>
</html>
